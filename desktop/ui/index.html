<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerUp AI</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.24/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-base-200">
<div class="flex min-h-screen">
<nav class="w-64 bg-base-300 p-5 flex flex-col">
    <div class="flex items-center gap-3 pb-6 border-b border-base-content/10">
        <span class="text-3xl">🚀</span>
        <span class="text-xl font-bold">CareerUp AI</span>
    </div>
    <ul class="menu menu-lg flex-1 mt-4">
        <li><a class="active" data-section="interview" onclick="switchSection('interview')"><span class="text-xl">🎤</span>Interview Coach</a></li>
        <li><a data-section="resume" onclick="switchSection('resume')"><span class="text-xl">📄</span>Resume Optimizer</a></li>
        <li><a data-section="personality" onclick="switchSection('personality')"><span class="text-xl">🧠</span>Personality Test</a></li>
        <li><a data-section="roadmap" onclick="switchSection('roadmap')"><span class="text-xl">🗺️</span>Career Roadmap</a></li>
        <li><a data-section="tips" onclick="switchSection('tips')"><span class="text-xl">💡</span>Insider Tips</a></li>
    </ul>
    <div class="pt-4 border-t border-base-content/10 space-y-2">
        <div class="dropdown dropdown-top w-full">
            <div tabindex="0" role="button" class="btn btn-outline btn-block">🎨 Theme</div>
            <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52">
                <li><a onclick="setTheme('night')">🌙 Night</a></li>
                <li><a onclick="setTheme('dark')">🌑 Dark</a></li>
                <li><a onclick="setTheme('dracula')">🧛 Dracula</a></li>
                <li><a onclick="setTheme('synthwave')">🌆 Synthwave</a></li>
                <li><a onclick="setTheme('forest')">🌲 Forest</a></li>
                <li><a onclick="setTheme('light')">☀️ Light</a></li>
                <li><a onclick="setTheme('cupcake')">🧁 Cupcake</a></li>
            </ul>
        </div>
        <button class="btn btn-outline btn-block" onclick="showSettings()">⚙️ Settings</button>
    </div>
</nav>
<main class="flex-1 p-8 overflow-y-auto">
<section id="interview" class="section active">
    <h1 class="text-3xl font-bold mb-6">🎤 Interview Coach</h1>
    <div class="card bg-base-100 shadow-xl mb-6"><div class="card-body">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="form-control"><label class="label"><span class="label-text">Target Role</span></label>
            <input type="text" id="interview-role" class="input input-bordered" value="Product Manager"></div>
            <div class="form-control"><label class="label"><span class="label-text">Company</span></label>
            <input type="text" id="interview-company" class="input input-bordered" value="Google"></div>
            <div class="form-control"><label class="label"><span class="label-text">Question Type</span></label>
            <select id="interview-type" class="select select-bordered">
                <option value="behavioral">Behavioral</option><option value="technical">Technical</option>
                <option value="case_study">Case Study</option><option value="product_sense">Product Sense</option>
            </select></div>
        </div>
        <button class="btn btn-primary mt-4" onclick="getQuestion()">Generate Question</button>
    </div></div>
    <div id="interview-content"></div>
</section>
